version: "3.9"

# Security Diagnostic Toolkit – Docker Compose
#
# Services:
#   api    – FastAPI service (port 8000)
#   redis  – Optional Redis for rate limiting (port 6379)
#
# Usage:
#   docker-compose up --build
#   docker-compose up --build -d          # detached
#   docker-compose down -v                # stop and remove volumes

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: security-toolkit-api:latest
    container_name: security-toolkit-api
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - LOG_JSON=true
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: security-toolkit-redis
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
