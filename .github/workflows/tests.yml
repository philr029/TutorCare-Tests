name: Python Tests

# Run on every push and pull request, plus a daily schedule.
# This workflow installs dependencies, runs the full pytest suite,
# and uploads a coverage report as an artefact.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  schedule:
    # Daily at 02:00 UTC – catches upstream dependency regressions
    - cron: "0 2 * * *"
  workflow_dispatch:   # allow manual runs from the Actions UI

jobs:
  test:
    name: pytest – Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    permissions:
      contents: read        # checkout only
      checks: write         # allow test-reporter to write check results
      pull-requests: write  # allow test-reporter to annotate PRs

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python setup ──────────────────────────────────────────────────────
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # ── Install dependencies ───────────────────────────────────────────────
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            "requests>=2.31.0" \
            "dnspython>=2.4.0" \
            "phonenumbers>=8.13.0" \
            "cryptography>=41.0.0" \
            "pyyaml>=6.0.1" \
            "pytest>=7.4.0" \
            "pytest-mock>=3.12.0" \
            "responses>=0.24.0" \
            "urllib3>=2.1.0" \
            "beautifulsoup4>=4.12.0"

      # ── Run tests ─────────────────────────────────────────────────────────
      - name: Run pytest with coverage
        env:
          AUTH_DISABLED: "true"
          RATE_LIMIT_ENABLED: "false"
          PYTHONPATH: "."
        run: |
          python -m pytest tests/ \
            --ignore=tests/test_src_ip_reputation.py \
            --ignore=tests/test_src_phone_validation.py \
            --ignore=tests/test_src_domain_reputation.py \
            --ignore=tests/test_src_site_diagnostics.py \
            -v \
            --tb=short \
            --junitxml=test-results/junit.xml \
            --log-cli-level=WARNING

      # ── Upload test results ────────────────────────────────────────────────
      - name: Upload test results
        if: always()   # upload even on failure so logs are available
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results-py${{ matrix.python-version }}
          path: test-results/
          retention-days: 14

      # ── Publish test results as PR check (best-effort) ─────────────────────
      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: pytest (${{ matrix.python-version }})
          path: test-results/junit.xml
          reporter: java-junit
          fail-on-error: false
