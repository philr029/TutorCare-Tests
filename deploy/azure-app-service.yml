# Azure App Service deployment configuration
# Deploy with: az webapp up --name <app-name> --resource-group <rg> --plan <plan>
#
# Or use the GitHub Actions workflow below (save as .github/workflows/deploy-azure.yml)

# ── GitHub Actions workflow ──────────────────────────────────────────────────
name: Deploy to Azure App Service

on:
  push:
    branches: [main]

env:
  AZURE_WEBAPP_NAME: security-toolkit-api   # Change to your App Service name
  AZURE_WEBAPP_PACKAGE_PATH: .
  PYTHON_VERSION: "3.11"
  DOCKER_IMAGE: security-toolkit-api

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -f Dockerfile.api \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.DOCKER_IMAGE }}:${{ github.sha }} \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.DOCKER_IMAGE }}:latest \
            .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.DOCKER_IMAGE }}:latest

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.DOCKER_IMAGE }}:${{ github.sha }}

# ── Azure App Service app settings (environment variables) ──────────────────
# Set these in the Azure Portal > App Service > Configuration > Application settings,
# or via the Azure CLI:
#
#   az webapp config appsettings set \
#     --resource-group <rg> \
#     --name <app-name> \
#     --settings \
#       API_KEYS="your-secret-key" \
#       RATE_LIMIT_DEFAULT="60/minute" \
#       LOG_JSON="true" \
#       LOG_LEVEL="INFO" \
#       ABUSEIPDB_KEY="" \
#       VIRUSTOTAL_KEY="" \
#       NUMVERIFY_KEY="" \
#       TWILIO_SID="" \
#       TWILIO_TOKEN="" \
#       REDIS_URL="" \
#       WEBSITES_PORT=8000

# ── Port configuration ────────────────────────────────────────────────────────
# Azure App Service reads WEBSITES_PORT to know which port to forward.
# Our container listens on 8000 – set WEBSITES_PORT=8000 in app settings.

# ── Health check ─────────────────────────────────────────────────────────────
# Azure App Service health check path: /health
# Configure in: App Service > Monitoring > Health check > Path = /health
