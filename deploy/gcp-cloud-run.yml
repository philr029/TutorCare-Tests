# Google Cloud Run deployment configuration
#
# Deploy with:
#   gcloud run deploy security-toolkit-api \
#     --source . \
#     --dockerfile Dockerfile.api \
#     --region us-central1 \
#     --platform managed \
#     --allow-unauthenticated \
#     --port 8000 \
#     --set-env-vars "LOG_JSON=true,LOG_LEVEL=INFO,RATE_LIMIT_DEFAULT=60/minute" \
#     --set-secrets "API_KEYS=toolkit-api-keys:latest,ABUSEIPDB_KEY=toolkit-abuseipdb:latest"
#
# Or use the cloudbuild.yaml below.

# ── Cloud Build config (cloudbuild.yaml) ─────────────────────────────────────
steps:
  # 1. Build the Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - "-f"
      - Dockerfile.api
      - "-t"
      - "gcr.io/$PROJECT_ID/security-toolkit-api:$COMMIT_SHA"
      - "-t"
      - "gcr.io/$PROJECT_ID/security-toolkit-api:latest"
      - "."

  # 2. Push to Google Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - "gcr.io/$PROJECT_ID/security-toolkit-api:$COMMIT_SHA"

  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - "gcr.io/$PROJECT_ID/security-toolkit-api:latest"

  # 3. Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - security-toolkit-api
      - "--image=gcr.io/$PROJECT_ID/security-toolkit-api:$COMMIT_SHA"
      - "--region=us-central1"
      - "--platform=managed"
      - "--port=8000"
      - "--memory=512Mi"
      - "--cpu=1"
      - "--min-instances=0"
      - "--max-instances=10"
      - "--set-env-vars=API_HOST=0.0.0.0,API_PORT=8000,API_WORKERS=2,LOG_JSON=true,LOG_LEVEL=INFO,RATE_LIMIT_DEFAULT=60/minute"
      - "--set-secrets=API_KEYS=toolkit-api-keys:latest"
      - "--allow-unauthenticated"

images:
  - "gcr.io/$PROJECT_ID/security-toolkit-api:$COMMIT_SHA"
  - "gcr.io/$PROJECT_ID/security-toolkit-api:latest"

# ── Environment variable mapping ─────────────────────────────────────────────
# Cloud Run env vars (set via gcloud CLI or Cloud Console):
#
#   API_HOST             = 0.0.0.0
#   API_PORT             = 8000       (must match --port above)
#   API_WORKERS          = 2
#   LOG_JSON             = true
#   LOG_LEVEL            = INFO
#   RATE_LIMIT_DEFAULT   = 60/minute
#   CORS_ORIGINS         = *
#
# Secrets (store in Secret Manager, then reference with --set-secrets):
#   API_KEYS             → toolkit-api-keys
#   ABUSEIPDB_KEY        → toolkit-abuseipdb-key
#   VIRUSTOTAL_KEY       → toolkit-virustotal-key
#   NUMVERIFY_KEY        → toolkit-numverify-key
#   TWILIO_SID           → toolkit-twilio-sid
#   TWILIO_TOKEN         → toolkit-twilio-token
#   REDIS_URL            → toolkit-redis-url

# ── Health check ─────────────────────────────────────────────────────────────
# Cloud Run automatically uses HTTP GET on the root path.
# Configure liveness/startup probes in the Cloud Console or YAML service spec:
#
#   livenessProbe:
#     httpGet:
#       path: /health
#       port: 8000
#     initialDelaySeconds: 10
#     periodSeconds: 30
